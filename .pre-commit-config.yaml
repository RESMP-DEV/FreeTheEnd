# Pre-commit hooks for FreeTheEnd
#
# Install with:
#   pip install pre-commit
#   pre-commit install
#
# Run manually:
#   pre-commit run --all-files

repos:
  # Ruff - fast Python linter and formatter
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.9
    hooks:
      - id: ruff
        args: [--fix, --ignore, E501]
      - id: ruff-format

  # Standard pre-commit hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: debug-statements

  # Type checking
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.7.1
    hooks:
      - id: mypy
        additional_dependencies: [numpy, gymnasium]
        args: [--ignore-missing-imports]

  # Custom hooks for dimension consistency
  - repo: local
    hooks:
      - id: check-hardcoded-dims
        name: Check hardcoded dimensions
        description: Detect hardcoded observation/action dimensions that should use constants
        entry: python scripts/check_hardcoded_dims.py --errors-only
        language: python
        types: [python]
        pass_filenames: true
