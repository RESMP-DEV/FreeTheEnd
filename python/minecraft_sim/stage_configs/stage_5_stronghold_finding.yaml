observation_space:
  - player_position
  - player_health
  - player_hunger
  - player_direction
  - nearby_blocks
  - nearby_entities
  - inventory
  - equipped_item
  - time_of_day
  - biome
  - y_level
  - eye_trajectory
  - eye_landed_position
  - triangulation_waypoints
  - estimated_stronghold_pos
  - in_stronghold
  - stronghold_rooms_visited
  - portal_frame_status
curriculum_threshold: 0.55
shader_set:
  - stronghold_gen
  - decoration
metadata:
  triangulation_guide:
    step_1: Throw eye, record direction vector
    step_2: Travel 200-500 blocks perpendicular to eye direction
    step_3: Throw again, find intersection of two direction lines
    step_4: When eye goes down, dig straight down
  stronghold_depth_range:
    - -64
    - 0
  portal_frames_needed: 12
  eye_break_chance: 0.2
  speedrun_notes: >-
    Blind travel method: go to 0,0 coords, travel ~1800 blocks in any
    direction, strongholds always generate in rings. First ring: 1408-2688
    blocks from origin.
