id: 2
name: Resource Gathering
description: >-
  Master resource collection and crafting progression. Mine ores, smelt them
  in furnaces, and craft iron/diamond equipment. Build a basic shelter for
  safety during night.
objectives:
  - Mine 32 cobblestone
  - Mine 16 iron ore
  - Mine 3 diamonds
  - Build a furnace
  - Smelt iron ingots
  - Craft iron pickaxe
  - Craft iron sword
  - Build basic shelter (enclosed space)
spawn:
  biome: plains
  time_of_day: 0
  weather: clear
  random_position: true
  position: null
  inventory:
    wooden_pickaxe: 1
    wooden_sword: 1
    oak_log: 16
  health: 20.0
  hunger: 20.0
rewards:
  sparse_reward: 15.0
  dense_rewards:
    cobblestone_mined: 0.02
    coal_mined: 0.1
    iron_ore_mined: 0.3
    gold_ore_mined: 0.2
    diamond_mined: 1.0
    redstone_mined: 0.1
    lapis_mined: 0.1
    stone_pickaxe_crafted: 0.3
    stone_sword_crafted: 0.2
    furnace_crafted: 0.5
    iron_ingot_smelted: 0.2
    iron_pickaxe_crafted: 0.8
    iron_sword_crafted: 0.8
    iron_armor_crafted: 0.5
    diamond_pickaxe_crafted: 1.5
    diamond_sword_crafted: 1.5
    block_placed: 0.01
    shelter_built: 2.0
    bed_crafted: 0.5
    vertical_mining: 0.05
    cave_found: 0.3
    ore_vein_found: 0.2
  penalty_per_death: -1.5
  penalty_per_tick: -0.0001
  exploration_bonus: 0.02
termination:
  max_ticks: 48000
  max_deaths: 7
  success_conditions:
    - objective:mine_cobblestone >= 32
    - objective:mine_iron >= 16
    - objective:mine_diamond >= 3
    - inventory:iron_pickaxe >= 1
    - inventory:iron_sword >= 1
    - objective:shelter_built == True
  failure_conditions:
    - deaths >= max_deaths
    - ticks >= max_ticks
prerequisites:
  - 1
difficulty: 3
expected_episodes: 1000
