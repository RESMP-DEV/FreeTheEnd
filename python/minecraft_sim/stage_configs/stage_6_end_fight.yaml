    avoid_dragon_breath: 0.3
    avoid_knockback: 0.2
    survive_dragon_dive: 0.5
    collect_dragon_breath: 0.5
    use_water_bucket_save: 1.0
    use_pearl_save: 0.5
    dragon_killed: 50.0
    collect_dragon_egg: 5.0
    enter_exit_portal: 10.0
  penalty_per_death: -5.0
  penalty_per_tick: -0.0002
  exploration_bonus: 0.0
