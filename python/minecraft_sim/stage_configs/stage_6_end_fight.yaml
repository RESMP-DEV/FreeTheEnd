metadata:
  dragon_phases:
    circling: Dragon flies around, shoot with bow
    strafing: Dragon dives, dodge sideways
    perching: Dragon lands on fountain, melee attack
    breath: Dragon breathes, creates lingering damage cloud
  crystal_count: 10
  caged_crystals: 2
  tower_heights:
    - 76
    - 79
    - 82
    - 85
    - 88
    - 91
    - 94
    - 97
    - 100
    - 103
  strategies:
    standard: Destroy crystals with bow, melee on perch
    bed_explosion: Place and sleep in bed next to dragon (explodes)
    one_cycle: All damage in single perch phase with beds
  speedrun_notes: >
    One-cycle possible with beds: place bed near dragon head during perch,
    click to 'sleep', explosion does massive damage. 7 beds can kill dragon
    in one perch. Requires precise timing.
  common_deaths:
    - Knocked into void by dragon
    - Crystal explosion damage
    - Dragon breath damage over time
    - Fall damage from towers
