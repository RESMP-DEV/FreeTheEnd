id: 6
name: End Fight
description: >
  The final challenge: defeat the Ender Dragon. Enter the End dimension,
  destroy the healing crystals on obsidian towers, avoid dragon attacks, and
  deal damage during perching phases to kill the dragon.
objectives:
  - Enter the End portal
  - Survive the obsidian platform spawn
  - Destroy all End crystals (priority: caged ones)
  - Avoid dragon breath and knockback
  - Damage dragon during perching phases
  - Kill the Ender Dragon
  - Collect dragon egg (optional)
  - Enter exit portal to complete the game
spawn:
  biome: the_end
  time_of_day: 0
  weather: clear
  random_position: false
  position:
    - 0.0
    - 64.0
    - 0.0
  inventory:
    diamond_sword: 1
    bow: 1
    arrow: 64
    diamond_pickaxe: 1
    iron_pickaxe: 1
    diamond_helmet: 1
    diamond_chestplate: 1
    diamond_leggings: 1
    diamond_boots: 1
    shield: 1
    water_bucket: 1
    ender_pearl: 8
    cobblestone: 128
    cooked_beef: 32
    golden_apple: 4
    bed: 1
    crafting_table: 1
  health: 20.0
  hunger: 20.0
