  - name: docs-troubleshooting-guide
    prompt: |
      Create contrib/minecraft_sim/docs/troubleshooting.md

      **Common issues and solutions:**

      ## Installation Issues

      ### "VK_ICD_FILENAMES not set"
      - Symptom: Vulkan initialization fails
      - Fix: export VK_ICD_FILENAMES=/opt/homebrew/etc/vulkan/icd.d/MoltenVK_icd.json

      ### "mc189_core not found"
      - Symptom: ImportError on import
      - Fix: Build and copy .so file to python/minecraft_sim/

      ### "Python version mismatch"
      - Symptom: ImportError with ABI mismatch
      - Fix: Use Python 3.12, not 3.14

      ## Runtime Issues

      ### "Low throughput"
      - Check GPU utilization
      - Reduce num_envs if memory-bound
      - Verify shader compilation

      ### "NaN in observations"
      - Check for division by zero in reward shaping
      - Validate environment reset

      ### "Agent stuck in death loop"
      - Reward clipping needed
      - Death penalty too high
      - Add survival bonus

      ## Training Issues

      ### "Reward collapse to zero"
      - Learning rate too high
      - Entropy coefficient too low
      - Not enough exploration

      ### "Episode length not decreasing"
      - Check success condition
      - Verify milestone rewards
      - Add intermediate rewards

      Include diagnostic commands for each issue.
    priority: P2
    dependencies:
      - docs-quickstart-by-the-numbers

