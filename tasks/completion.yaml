  - name: fix-nether-state-tracking
    prompt: |
      Fix the Nether state tracking issue in contrib/minecraft_sim/python/minecraft_sim/stage_envs.py.

      **Problem:** Tests expect `_build_snapshot()` to update `_stage_state["in_nether"]` when obs[12] > 0.5, but the update logic is only in `_shape_reward()`.

      **Failing tests:**
      - tests/test_stage3_nether.py::TestStageStateNetherEntry::test_in_nether_set_on_dimension_indicator
      - tests/test_stage3_nether.py::TestStageStateNetherEntry::test_in_nether_remains_true_after_cleared
      - tests/test_stage3_nether.py::TestStageStateFullProgression::test_full_nether_progression
      - tests/test_stage3_nether.py::TestStageStateFullProgression::test_snapshot_values_match_stage_state

      **Fix:** In NetherNavigationEnv._build_snapshot(), add logic to update self._stage_state["in_nether"]:
      ```python
      def _build_snapshot(self, obs: NDArray[np.float32]) -> dict[str, Any]:
          # ... existing code ...
          
          # Update stage state for nether entry (persistent flag)
          if obs.size > 12 and obs[12] > 0.5 and not self._stage_state["in_nether"]:
              self._stage_state["in_nether"] = True
          
          # ... rest of method
      ```

      Look for _build_snapshot around line 712 in stage_envs.py.
      Run: `cd contrib/minecraft_sim && uv run pytest tests/test_stage3_nether.py::TestStageStateNetherEntry -v`
    priority: P0

  - name: fix-reward-bounds
    prompt: |
      Fix the reward bounds issue in Stage 4 (Stronghold Finding) environment.

      **Problem:** Test expects min_reward > -10.0 but actual rewards reach -50.0.

      **Failing test:**
      - tests/test_stage4_stronghold.py::TestRewardPolicyConsistency::test_reward_bounded_by_policy

      **File:** contrib/minecraft_sim/python/minecraft_sim/stage_envs.py (StrongholdFindingEnv class)

      **Fix options:**
      1. Clamp negative rewards in _shape_reward() to -10.0:
         `reward = max(reward, -10.0)`
      2. Or reduce death penalty from -50 to -10
      3. Or adjust reward_scale to keep total within bounds

      Look for StrongholdFindingEnv class and its _shape_reward method.
      The death penalty should not exceed the test bound of -10.0.

      Run: `cd contrib/minecraft_sim && uv run pytest tests/test_stage4_stronghold.py::TestRewardPolicyConsistency -v`
    priority: P0
    dependencies:
      - fix-nether-state-tracking

