  - name: docs-quickstart-by-the-numbers
    prompt: |
      Create a "By The Numbers" quickstart tutorial at contrib/minecraft_sim/docs/quickstart_by_numbers.md

      **Target audience:** Developer who wants working code in 5 minutes.

      **Structure:**
      ```markdown
      # Quickstart: Dragon Fight in 5 Minutes

      ## Prerequisites (1 minute)
      - Python 3.12
      - uv package manager
      - macOS with MoltenVK or Linux with Vulkan

      ## Install (1 minute)
      ```bash
      cd minecraft_sim
      uv sync
      export VK_ICD_FILENAMES=/opt/homebrew/etc/vulkan/icd.d/MoltenVK_icd.json
      ```

      ## Run Your First Environment (1 minute)
      ```python
      from minecraft_sim import VecDragonFightEnv
      env = VecDragonFightEnv(num_envs=64)
      obs = env.reset()
      for _ in range(1000):
          obs, rewards, dones, infos = env.step(np.zeros(64, dtype=np.int32))
      env.close()
      print("Success!")
      ```

      ## Train a PPO Agent (2 minutes)
      ```python
      from minecraft_sim import SB3VecDragonFightEnv
      from stable_baselines3 import PPO
      env = SB3VecDragonFightEnv(num_envs=64)
      model = PPO("MlpPolicy", env, verbose=1)
      model.learn(total_timesteps=100_000)
      model.save("dragon_ppo")
      ```

      ## Key Numbers
      | Metric | Value |
      |--------|-------|
      | Throughput | 264K steps/sec |
      | Observation dim | 48 |
      | Actions | 17 |
      | Episode length | ~2000 steps |
      ```

      Keep it SHORT. No theory, just working commands.
    priority: P1
    dependencies:
      - docs-update-throughput-numbers

