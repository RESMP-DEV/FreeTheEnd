  - name: cpu-backend-add-seed-parameter
    prompt: |
      Add seed parameter to MC189Simulator reset() method for deterministic runs.

      **Problem:** test_cpu_backend.py tests fail because reset(seed=42) isn't supported.
      The pybind11 binding only accepts env_id parameter.

      **Current binding (cpp/src/bindings/py_simulator.cpp):**
      ```cpp
      .def("reset", [](MC189Simulator &self, py::object env_id) { ... })
      ```

      **Required change:**
      Add optional seed parameter:
      ```cpp
      .def("reset", [](MC189Simulator &self, py::object env_id, py::object seed) {
          uint32_t env = env_id.is_none() ? 0xFFFFFFFF : py::cast<uint32_t>(env_id);
          if (!seed.is_none()) {
              uint64_t s = py::cast<uint64_t>(seed);
              self.reset(env, s);
          } else {
              self.reset(env);
          }
      }, py::arg("env_id") = py::none(), py::arg("seed") = py::none())
      ```

      **Also update simulator interface if needed:**
      - File: cpp/include/mc189/simulator.h
      - Add: void reset(uint32_t env_id, uint64_t seed);

      **Validation:**
      ```bash
      cd contrib/minecraft_sim/cpp/build
      cmake -DMC189_BUILD_TESTS=OFF -DPython3_EXECUTABLE=$(uv run which python) ..
      cmake --build . --target mc189_core -j8
      cp mc189_core.cpython-312-darwin.so ../../python/minecraft_sim/
      cd ../..
      PYTHONPATH=python uv run pytest tests/test_cpu_backend.py -v
      ```
    priority: P0

  - name: cpu-backend-fix-single-env-reset
    prompt: |
      Fix single-environment reset to actually change observations.

      **Problem:** test_reset_single_env fails because resetting env 0 doesn't
      change its observations.

      **Failing test logic:**
      ```python
      obs_before = sim.get_observations()
      sim.step(actions)  # Change state
      sim.reset(0)  # Reset just env 0
      obs_after = sim.get_observations()
      assert not np.array_equal(obs_before[0], obs_after[0])  # Should differ
      ```

      **Investigation:**
      1. Check cpp/src/mc189_simulator.cpp reset() method
      2. Verify it actually modifies the observation buffer for the specified env
      3. The observations might be cached or not re-computed after reset

      **Likely fix:** Call get_observations() or update observation buffer after reset.

      **Validation:**
      ```bash
      cd contrib/minecraft_sim
      PYTHONPATH=python uv run pytest tests/test_cpu_backend.py::TestCPUBackendReset -v
      ```
    priority: P0
    dependencies:
      - cpu-backend-add-seed-parameter

