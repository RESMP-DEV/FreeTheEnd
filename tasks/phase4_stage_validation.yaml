  - name: fix-float-precision-tests
    prompt: |
      Fix floating-point precision issues in inventory persistence tests.

      **Failing tests:**
      - tests/test_full_speedrun.py::TestInventoryPersistence::test_advance_stage_persists_inventory
      - tests/test_full_speedrun.py::TestInventoryPersistence::test_set_stage_persists_inventory

      **Problem:** Direct float comparison fails due to precision:
      `assert env._inventory_state["iron_ingot"] == 0.3`
      but actual value is `0.30000001192092896`

      **Fix:** Use `pytest.approx()` for float comparisons:
      ```python
      assert env._inventory_state["iron_ingot"] == pytest.approx(0.3, rel=1e-5)
      assert env._inventory_state["ender_pearl"] == pytest.approx(0.8, rel=1e-5)
      ```

      **File:** tests/test_full_speedrun.py

      **Validation:**
      ```bash
      PYTHONPATH=python uv run pytest tests/test_full_speedrun.py::TestInventoryPersistence -v
      ```
    priority: P0

