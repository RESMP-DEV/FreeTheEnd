      ```python
      from minecraft_sim.curriculum import CurriculumManager, StageID

      cm = CurriculumManager()

      # Test stage loading
      for stage_id in StageID:
          stage = cm.get_stage(stage_id)
          assert stage is not None, f"Failed to load {stage_id}"
          print(f"✓ {stage_id.name}: {stage.name}")

