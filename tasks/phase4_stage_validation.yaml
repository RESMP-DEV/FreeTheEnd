          cm.record_episode(success=True, reward=100, ticks=1000)

      if cm.should_advance():
          new_stage = cm.advance_stage()
          print(f"✓ Advanced to {new_stage.name}")

      print("Curriculum integration test passed")
      ```

      **Validation:**
